<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>AI Wealth Advisor</title>
  <script>
    window.addEventListener('error', function (event) {
      document.body.innerHTML = '<div style="color:red;padding:20px;font-family:monospace;background:black;"><h2>CRASH</h2>' + event.error?.stack + '</div>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML = '<div style="color:red;padding:20px;font-family:monospace;background:black;"><h2>PROMISE CRASH</h2>' + event.reason + '</div>';
    });
  </script>
</head>

<body class="bg-[#121212] text-[#E0E0E0] font-sans antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
